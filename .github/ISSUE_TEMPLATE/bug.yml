name: Bug Report
description: File a bug report for unexpected behavior or errors.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Thank you for reporting a bug.** Please ensure you are running the latest version and have checked existing issues before submitting.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Run command '...'
        2. Send API request '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Logs or Tracebacks
      description: Paste the output of the error logs here.
      render: shell
  - type: input
    id: env-python
    attributes:
      label: Python Version
      placeholder: e.g. 3.14.5
    validations:
      required: true
  - type: input
    id: env-docker
    attributes:
      label: Docker / Container Runtime Version
      placeholder: e.g. Docker 24.0.5
    validations:
      required: true
