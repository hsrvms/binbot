name: Feature Request
description: Suggest an idea, enhancement, or new feature.
labels: ["enhancement", "under-review"]
body:
    - type: textarea
      id: problem
      attributes:
          label: The Problem
          description: Is your feature request related to a problem? Please describe it.
          placeholder: "I am constantly frustrated when..."
      validations:
          required: true
    - type: textarea
      id: solution
      attributes:
          label: Proposed Solution
          description: Describe the solution or technical implementation you'd prefer.
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives Considered
          description: Describe any alternative solutions or workarounds you've considered.
